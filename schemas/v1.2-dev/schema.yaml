$id: https://spec.openapis.org/overlay/1.2/schema/WORK-IN-PROGRESS
$schema: https://json-schema.org/draft/2020-12/schema
description: The description of Overlay v1.2.x documents
type: object
properties:
  overlay:
    type: string
    pattern: ^1\.2\.\d+$
  info:
    $ref: "#/$defs/info-object"
  extends:
    type: string
    format: uri-reference
  actions:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      oneOf:
        - $ref: "#/$defs/reusable-action-reference-object"
        - $ref: "#/$defs/reusable-action-object"
  components:
    $ref: "#/$defs/components-object"
required:
  - overlay
  - info
  - actions
$ref: "#/$defs/specification-extensions"
unevaluatedProperties: false
$defs:
  reusable-action-reference-object:
    type: object
    allOf:
      - $ref: "#/$defs/specification-extensions"
      - $ref: "#/$defs/action-object"
    properties:
      $ref:
        type: string
        pattern: ^#\/components\/actions\/\w+
    required:
      - $ref
    $ref: "#/$defs/specification-extensions"
    unevaluatedProperties: false
  reusable-action-object-parameter:
    type: object
    properties:
      name:
        type: string
      default:
        type:
          - string
          - boolean
          - object
          - array
          - number
          - "null"
    required:
      - name
    description: A parameter to be used in a reusable action object
    $ref: "#/$defs/specification-extensions"
    unevaluatedProperties: false
  reusable-action-object:
    type: object
    allOf:
      - $ref: "#/$defs/specification-extensions"
      - $ref: "#/$defs/action-object"
    properties:
      parameters:
        type: array
        items:
          $ref: "#/$defs/reusable-action-object-parameter"
      environmentVariables:
        type: array
        items:
          $ref: "#/$defs/reusable-action-object-parameter"
    unevaluatedProperties: false
  components-object:
    type: object
    properties:
      actions:
        type: object
        additionalProperties:
          $ref: "#/$defs/reusable-action-object"
    $ref: "#/$defs/specification-extensions"
    unevaluatedProperties: false
  info-object:
    type: object
    properties:
      title:
        type: string
      version:
        type: string
      description:
        type: string
    required:
      - title
      - version
    $ref: "#/$defs/specification-extensions"
    unevaluatedProperties: false
  action-object:
    properties:
      target:
        type: string
        pattern: ^\$
      description:
        type: string
      update:
        type:
          - string
          - boolean
          - object
          - array
          - number
          - "null"
      copy:
        type: string
      remove:
        type: boolean
        default: false
    required:
      - target #TODO this would be an issue for the reusable action and reference object, maybe move all the properties to a base?
    $ref: "#/$defs/specification-extensions"
    unevaluatedProperties: false
  specification-extensions:
    patternProperties:
      ^x-: true
