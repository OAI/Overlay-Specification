overlay: 1.2.0
info:
  title: Reusable action with environment variables
  version: 1.0.0
components:
  actions:
    setDescription:
      target: '$.info'
      environmentVariables:
        - name: stageName
          default: dev
        - name: regionName
      update:
        description: 'Deploy stage is %env.stageName% in %env.regionName%'
actions:
  - target: '$.info'
    update:
      description: Reusable action environment variables are declared in components
